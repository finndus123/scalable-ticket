spring:
  application:
    name: ticket-api
  # Database Config
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
  # Redis Config
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 100ms
  # RabbitMQ Config
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    template:
      receive-timeout: 3000
      reply-timeout: 3000

server:
  servlet:
    context-path: /api
  forward-headers-strategy: framework

# Resilience4j Config
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
    instances:
      redis:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5

      database:
        slidingWindowSize: 15
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        # Ignore custom exceptions
        ignoreExceptions:
          - de.playground.scalable_ticketing.common.exception.EventNotFoundException

      rabbitmq:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

  bulkhead:
    instances:
      database:
        maxConcurrentCalls: 30
        maxWaitDuration: 50ms

  retry:
    instances:
      rabbitmq:
        maxAttempts: 3
        waitDuration: 300ms
        retryExceptions:
          - org.springframework.amqp.AmqpException
          - java.io.IOException

# RabbitMQ Config (custom fields)
rabbitmq:
  exchange: ticket.exchange
  queue: ticket.order.queue
  routing:
    key: ticket.order.created

# Data Seeding
seed:
  enabled: ${SEED_ENABLED:false}

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 250ms, 500ms, 1s, 2s