spring:
  application:
    name: ticket-worker-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
# Resilience4j Test Config – smaller sliding windows for faster test feedback
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: false
        slidingWindowType: COUNT_BASED
    instances:
      redis:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 2

      database:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        # Ignore custom exceptions – must NOT trigger the circuit breaker
        ignoreExceptions:
          - de.playground.scalable_ticketing.common.exception.EventNotFoundException
          - de.playground.scalable_ticketing.common.exception.UserNotFoundException

  bulkhead:
    instances:
      database:
        maxConcurrentCalls: 30
        maxWaitDuration: 50ms

  retry:
    instances:
      database:
        maxAttempts: 4
        waitDuration: 100ms
        retryExceptions:
          - org.springframework.dao.OptimisticLockingFailureException

# RabbitMQ Config (custom fields)
rabbitmq:
  exchange: ticket.exchange.test
  queue: ticket.order.queue.test
  routing-key: ticket.order.#.test
  prefetch-count: 1