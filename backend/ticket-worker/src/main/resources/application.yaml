spring:
  application:
    name: ticket-worker
  # Database Config
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000
  # Redis Config
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 100ms
  # RabbitMQ Config
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

# Resilience4j Config
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
    instances:
      redis:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
      database:
        slidingWindowSize: 15
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        ignoreExceptions:
          - de.playground.scalable_ticketing.common.exception.EventNotFoundException
          - de.playground.scalable_ticketing.common.exception.UserNotFoundException
          - de.playground.scalable_ticketing.common.exception.InsufficientTicketsException
  bulkhead:
    instances:
      database:
        maxConcurrentCalls: 30
        maxWaitDuration: 50ms
  timelimiter:
    instances:
      redis:
        timeoutDuration: 500ms

# RabbitMQ Config (custom fields)
rabbitmq:
  exchange: ticket.exchange
  queue: ticket.order.queue
  routing-key: ticket.order.#
  # Pre-fetch count to prevent a single worker from hoarding tasks
  prefetch-count: 1

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true