apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-api
  namespace: ticket-system
  labels:
    app: ticket-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ticket-api
  template:
    metadata:
      labels:
        app: ticket-api
      annotations:
        # Allows Prometheus to scrape metrics from this pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: ticket-api
          image: ticket-api:latest
          imagePullPolicy: IfNotPresent # Uses the local image if available
          ports:
            - containerPort: 8080
          env:
            # Load non-sensitive configuration from ConfigMap
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_USER } }

            - name: RABBITMQ_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: RABBITMQ_HOST } }
            - name: RABBITMQ_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: RABBITMQ_PORT } }
            - name: RABBITMQ_USER
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: RABBITMQ_USER } }

            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: REDIS_PORT } }

            # Load sensitive passwords from Secret
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: DB_PASSWORD } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: RABBITMQ_PASSWORD } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: REDIS_PASSWORD } }
          # Health Checks (Verifies if the app is running and ready to receive traffic)
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-api
  namespace: ticket-system
  labels:
    app: ticket-api
spec:
  type: ClusterIP # Internal cluster access only; external traffic is handled via Ingress
  selector:
    app: ticket-api # Connects this service to the pods from the deployment
  ports:
    - protocol: TCP
      port: 8080 # Port exposed by the Service
      targetPort: 8080 # Port inside the container
