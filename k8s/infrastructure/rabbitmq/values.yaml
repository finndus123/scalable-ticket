# CloudPirates RabbitMQ Helm Chart Values
# https://artifacthub.io/packages/helm/cloudpirates-rabbitmq/rabbitmq

fullnameOverride: "rabbitmq"

## @section RabbitMQ Authentication
auth:
  enabled: true
  # We use the secret generated by Taskfile
  existingSecret: "ticket-system-secrets"
  existingPasswordKey: "RABBITMQ_PASSWORD"
  # Default username (will be overridden by --set in Taskfile)
  username: "user"

## @section Persistence
persistence:
  enabled: true
  storageClass: "standard"
  size: 2Gi

## @section Service configuration
service:
  type: ClusterIP
  # Default AMQP port (will be overridden by --set in Taskfile)
  amqpPort: 5672
  managementPort: 15672

## @section ManagementPlugin configuration
managementPlugin:
  enabled: true
