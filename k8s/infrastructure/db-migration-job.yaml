apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: ticket-system
spec:
  # Automatically cleanup the job after it finishes
  ttlSecondsAfterFinished: 100
  template:
    spec:
      containers:
        - name: flyway-migration
          image: ticket-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: SEED_ENABLED
              value: "true"
            # We override the entrypoint to just run the migrations if needed, 
            # but Spring Boot usually runs them on startup. 
            # To ensure the job finishes, we could use a specific profile or command.
            - name: SPRING_MAIN_WEB_APPLICATION_TYPE
              value: "none" 
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: DB_PASSWORD } }
      restartPolicy: OnFailure
  backoffLimit: 4
