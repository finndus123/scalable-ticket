apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: ticket-system
spec:
  # Keep the job for 10 minutes after it finishes to allow log inspection
  ttlSecondsAfterFinished: 600
  template:
    spec:
      containers:
        - name: flyway-migration
          image: ticket-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: SEED_ENABLED
              value: "true"
            - name: SPRING_MAIN_WEB_APPLICATION_TYPE
              value: "none"
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: DB_PASSWORD } }
            # Redis (required for context loading)
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: REDIS_PORT } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: REDIS_PASSWORD } }
            # RabbitMQ (required for context loading)
            - name: RABBITMQ_HOST
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: RABBITMQ_HOST } }
            - name: RABBITMQ_PORT
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: RABBITMQ_PORT } }
            - name: RABBITMQ_USER
              valueFrom: { configMapKeyRef: { name: ticket-system-config, key: RABBITMQ_USER } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { secretKeyRef: { name: ticket-system-secrets, key: RABBITMQ_PASSWORD } }
      restartPolicy: OnFailure
  backoffLimit: 2
