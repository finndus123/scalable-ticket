# Bitnami Redis Helm Chart Values
# https://artifacthub.io/packages/helm/bitnami/redis

architecture: standalone
namespaceOverride: "ticket-system"

# Authentication parameters
auth:
  enabled: true
  # We use the secret generated by Taskfile
  existingSecret: "ticket-system-secrets"
  existingSecretPasswordKey: "REDIS_PASSWORD"

# Master configuration
master:
  persistence:
    enabled: true
    storageClass: "standard"
    size: 1Gi
  # Service configuration (will be overridden by --set in Taskfile)
  service:
    ports:
      redis: 6379

# Deployment name and service configuration (service is reachable at 'redis-master:6379')
# We override the fullname to match the DB_HOST in configmap-old.yaml
fullnameOverride: "redis"

# Disable replica nodes for local development to save resources
replica:
  replicaCount: 0
