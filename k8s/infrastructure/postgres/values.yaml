# Bitnami PostgreSQL Helm Chart Values
# https://artifacthub.io/packages/helm/bitnami/postgresql

namespaceOverride: "ticket-system"

# Authentication parameters
auth:
  # We use the secret generated by Taskfile
  existingSecret: "ticket-system-secrets"
  secretKeys:
    adminPasswordKey: "DB_PASSWORD"
  # Default database name (will be overridden by --set in Taskfile)
  database: "postgres"

# Persistence parameters
primary:
  persistence:
    enabled: true
    # Use the default storage class provided by Minikube
    storageClass: "standard"
    size: 1Gi

# Deployment name and service configuration (service is reachable at 'postgres:5432')
fullnameOverride: "postgres"

