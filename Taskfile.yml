version: '3'

dotenv: ['.env']

tasks:
  k8s:deploy:
    desc: "Deploys all infrastructure and application manifests to Kubernetes"
    deps: [k8s:secrets, k8s:configmap, k8s:infra:helm-repo]
    cmds:
      # 1. Basic Setup
      - kubectl apply -f k8s/namespace.yaml
      - kubectl apply -f k8s/infrastructure/secret.yaml
      - kubectl apply -f k8s/infrastructure/configmap.yaml

      # 2. Infrastructure via Helm
      - task: k8s:infra:postgres
      - task: k8s:infra:redis
      - task: k8s:infra:rabbitmq

      # 3. Manual Infrastructure (e.g. Ingress & DB Migration)
      - kubectl apply -f k8s/infrastructure/ingress/ingress.yaml
      - task: k8s:infra:db-migrate

      # 4. Applications
      - kubectl apply -R -f k8s/apps/

  k8s:cleanup:
    desc: "Deletes the entire ticket-system namespace and all its resources"
    cmds:
      - kubectl delete namespace ticket-system --ignore-not-found

  k8s:app:redeploy:
    desc: "Rebuilds and redeploys the application code (API and Worker) via Docker build"
    cmds:
      - task: minikube:load-images
      - kubectl rollout restart deployment ticket-api ticket-worker -n ticket-system
      - kubectl rollout status deployment ticket-api -n ticket-system
      - kubectl rollout status deployment ticket-worker -n ticket-system

  k8s:secrets:
    internal: true
    desc: "Generates the Kubernetes secret.yaml from .env passwords"
    cmds:
      - |
        kubectl create secret generic ticket-system-secrets \
        -n ticket-system \
        --from-literal=DB_PASSWORD={{.DB_PASSWORD}} \
        --from-literal=DB_ADMIN_PASSWORD={{.DB_ADMIN_PASSWORD}} \
        --from-literal=RABBITMQ_PASSWORD={{.RABBITMQ_PASSWORD}} \
        --from-literal=REDIS_PASSWORD={{.REDIS_PASSWORD}} \
        --from-literal=RABBITMQ_COOKIE={{.RABBITMQ_COOKIE}} \
        --dry-run=client -o yaml > k8s/infrastructure/secret.yaml
    status:
      - test -f k8s/infrastructure/secret.yaml

  k8s:configmap:
    internal: true
    desc: "Generates the Kubernetes configmap.yaml from .env values"
    cmds:
      - |
        kubectl create configmap ticket-system-config \
        -n ticket-system \
        --from-literal=DB_HOST=postgres \
        --from-literal=DB_PORT={{.DB_PORT}} \
        --from-literal=DB_NAME={{.DB_NAME}} \
        --from-literal=DB_USER={{.DB_USER}} \
        --from-literal=RABBITMQ_HOST=rabbitmq \
        --from-literal=RABBITMQ_PORT={{.RABBITMQ_PORT}} \
        --from-literal=RABBITMQ_USER={{.RABBITMQ_USER}} \
        --from-literal=REDIS_HOST=redis-master \
        --from-literal=REDIS_PORT={{.REDIS_PORT}} \
        --dry-run=client -o yaml > k8s/infrastructure/configmap.yaml
    status:
      - test -f k8s/infrastructure/configmap.yaml

  k8s:infra:db-migrate:
    internal: true
    desc: "Runs the database migration job"
    cmds:
      - echo "Waiting for PostgreSQL to be ready..."
      - kubectl rollout status statefulset/postgres -n ticket-system --timeout=120s
      - kubectl delete job db-migration -n ticket-system --ignore-not-found
      - kubectl apply -f k8s/infrastructure/db-migration-job.yaml
      - kubectl wait --for=condition=Ready pod -l job-name=db-migration -n ticket-system --timeout=60s
      - kubectl logs -f job/db-migration -n ticket-system
      # Finally check if the job was actually successful
      - kubectl wait --for=condition=complete job/db-migration -n ticket-system --timeout=60s

  k8s:infra:helm-repo:
    internal: true
    desc: "Adds and updates necessary Helm repositories"
    cmds:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm repo update

  k8s:infra:postgres:
    internal: true
    desc: "Installs/Upgrades PostgreSQL via Helm using .env values"
    cmds:
      - |
        helm upgrade --install postgres bitnami/postgresql \
          -n ticket-system \
          -f k8s/infrastructure/postgres/values.yaml \
          --set auth.database={{.DB_NAME}} \
          --set auth.username={{.DB_USER}} \
          --set primary.service.ports.postgresql={{.DB_PORT}}

  k8s:infra:redis:
    internal: true
    desc: "Installs/Upgrades Redis via Helm using .env values"
    cmds:
      - |
        helm upgrade --install redis bitnami/redis \
          -n ticket-system \
          -f k8s/infrastructure/redis/values.yaml \
          --set master.service.ports.redis={{.REDIS_PORT}}

  k8s:infra:rabbitmq:
    internal: true
    desc: "Installs/Upgrades RabbitMQ via Helm using .env values"
    cmds:
      - |
        helm upgrade --install rabbitmq oci://registry-1.docker.io/cloudpirates/rabbitmq \
          -n ticket-system \
          -f k8s/infrastructure/rabbitmq/values.yaml \
          --set auth.username={{.RABBITMQ_USER}} \
          --set service.amqpPort={{.RABBITMQ_PORT}}

  minikube:setup:
    desc: "Complete minikube setup: start, enable ingress, and load images"
    cmds:
      - task: minikube:start
      - task: minikube:load-images

  minikube:start:
    internal: true
    desc: "Starts minikube with docker driver and enables ingress"
    cmds:
      - minikube start --driver=docker --cpus 4 --memory 6144
      - minikube addons enable ingress

  minikube:load-images:
    internal: true
    desc: "Builds and loads Docker images into minikube"
    cmds:
      - docker build -t ticket-api:latest -f backend/ticket-api/Dockerfile backend
      - docker build -t ticket-worker:latest -f backend/ticket-worker/Dockerfile backend
      - minikube image load ticket-api:latest
      - minikube image load ticket-worker:latest

  build:
    desc: "Builds the backend project using Maven"
    dir: backend
    cmds:
      - ./mvnw clean install